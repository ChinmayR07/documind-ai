# ─── Docker Compose Override — Development ────────────────────────────────────
#
# This file extends docker-compose.yml for local development.
# Docker Compose automatically merges this with docker-compose.yml.
#
# Key differences from production:
# - Uvicorn runs with --reload (auto-restarts on code changes)
# - DEBUG=true for verbose logging
# - Code is mounted as a volume (no rebuild needed for code changes)
#
# Usage:
#   docker compose up                        # uses both files automatically
#   docker compose -f docker-compose.yml up  # production mode only

version: "3.9"

services:
  api:
    # Override the production CMD with development server
    # --reload: watches for file changes and restarts automatically
    # --log-level debug: verbose output during development
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

    environment:
      - APP_ENV=development
      - DEBUG=true
